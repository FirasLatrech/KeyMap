<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="#0A0A0A"/>

    <!-- Hairline inner border -->
    <rect x="2" y="2" width="1020" height="1020" rx="226" ry="226"
          fill="none" stroke="#262626" stroke-width="3"/>

    <!-- K + ك, vertically centred as a pair -->
    <g font-weight="700" text-anchor="middle">
      <text x="372" y="640" font-size="560"
            font-family="ui-monospace, 'SF Mono', Menlo, monospace"
            fill="#FAFAFA" letter-spacing="-18">K</text>

      <text x="680" y="650" font-size="520"
            font-family="'IBM Plex Sans Arabic', 'Geeza Pro', system-ui, sans-serif"
            fill="#7C5CFF">ك</text>
    </g>

    <!-- Keyboard baseline accent -->
    <rect x="220" y="820" width="584" height="6" rx="3" fill="#7C5CFF"/>
  </g>
</svg>
